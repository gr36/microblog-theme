{{ define "main" }}
<div class="wrap">
<div class="home-grid">
<div class="grid-main">
<article class="card article-card h-entry">
  <div class="reply-context">
    Replying to
    <img src="{{ .Params.reply_to_avatar }}" alt="">
    {{ if eq .Params.reply_to_hostname "micro.blog" }}
    <a href="{{ .Params.reply_to_url }}" class="u-in-reply-to">@{{ .Params.reply_to_username }}</a>
    {{ else }}
    <a href="{{ .Params.reply_to_url }}" class="u-in-reply-to">{{ .Params.reply_to_hostname }}</a>
    {{ end }}
  </div>
  <section class="e-content post-body">
    {{ partial "content.html" . }}
  </section>
  <footer class="post-footer">
    <time class="meta dt-published" datetime="{{ .Date.Format "2006-01-02 15:04:05 -0700" }}">{{ .Date.Format "3:04pm, 2 January 2006" }}</time>
  </footer>
</article>
</div>
{{ partial "sidebar.html" . }}
</div>
</div>
{{ end }}
