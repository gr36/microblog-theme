<header class="site-header">
  <div class="wrap">
    <a class="wordmark" href="/">{{ .Site.Title }}</a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="/" {{ if and .IsHome (eq .RelPermalink "/") }}aria-current="page"{{ end }}>Home</a>
      {{ $current := . }}
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" {{ if hasPrefix $current.RelPermalink .URL }}aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
      {{ if .Site.Params.has_newsletters }}
      <a class="nav-cta" href="/subscribe/">Subscribe</a>
      {{ end }}
    </nav>
  </div>
</header>
